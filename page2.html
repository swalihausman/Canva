<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Love For You ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Nunito:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    text-align:center;
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#f8cfc4,#fde7df);
    overflow:hidden;
    color:#b45454;
}

/* Heading */
h1{
    margin-top:80px;
    font-family:'Alex Brush',cursive;
    font-size:75px;
}

/* Glass romantic card */
.card{
    width:60%;
    margin:30px auto;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* Typing text */
#typing{
    font-size:22px;
    min-height:40px;
}

/* Love Meter */
.meter-container{
    width:80%;
    height:30px;
    background:rgba(255,255,255,0.5);
    border-radius:50px;
    margin:40px auto;
    overflow:hidden;
}

.meter{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff9a9e,#fbc2eb);
    border-radius:50px;
    transition:width 0.3s;
    text-align:center;
    line-height:30px;
    font-weight:bold;
    color:white;
}

/* Buttons */
button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#e58b8b;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:#e58b8b;
    font-size:16px;
    opacity:0.6;
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* Sparkles */
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:0.9;}
}
</style>
</head>

<body>

<h1>heyyyyyy♡</h1>

<div class="card">
    <div id="typing"></div>

    <div class="meter-container">
        <div class="meter" id="loveMeter"></div>
    </div>

    <button onclick="startLove()">Measure My Love ♡</button>
    <br>
    <button onclick="nextPage()">Final Surprise ✨</button>
</div>

<script>
// Typing Effect
const text="Every heartbeat, every thought, every dream… somehow leads back to you.";
let i=0;
function type(){
    if(i<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;
        setTimeout(type,50);
    }
}
type();

// Love Meter Animation
function startLove(){
    let width=0;
    const meter=document.getElementById("loveMeter");
    const interval=setInterval(()=>{
        if(width>=100){
            clearInterval(interval);
            meter.innerHTML="Infinity ♾";
        }else{
            width++;
            meter.style.width=width+"%";
        }
    },25);
}

// Floating Hearts
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),10000);
}
setInterval(createHeart,800);

// Sparkles
function createSparkle(){
    const sparkle=document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.style.left=Math.random()*100+"vw";
    sparkle.style.top=Math.random()*100+"vh";
    document.body.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),3000);
}
setInterval(createSparkle,500);

function nextPage(){
    window.location.href="page3.html";
}
</script>

</body>
</html>
