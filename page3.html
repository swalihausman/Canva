<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forever ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Nunito:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    text-align:center;
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#f8d5cb,#fde7df);
    color:#b45454;
}

h1{
    margin-top:80px;
    font-family:'Alex Brush',cursive;
    font-size:75px;
}

/* Gallery */
.gallery{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding-bottom:80px;
}

.gallery img{
    width:230px;
    height:300px;
    object-fit:cover;
    border-radius:20px;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.final-text{
    margin-top:30px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>Forever With You ♡</h1>

<div class="final-text">
No matter where life takes us,  
my heart will always choose you.
</div>

<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

</body>
</html>
